<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제 10기 다시 태어나는 나, 나비 — 신청서</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* 디자인 코드는 트리님의 원본과 100% 동일합니다 (수정 없음) */
    :root {
      --bg:         #FAF7F2;
      --section-bg: #F0EBE1;
      --card-bg:    #FFFFFF;
      --terra:      #B07D62;
      --terra-dark: #8C6148;
      --olive:      #7A8C6E;
      --olive-light:#A8B89C;
      --text-main:  #2C1F14;
      --text-sub:   #6B5744;
      --text-light: #9C8776;
      --border:     #DDD0C0;
      --input-bg:   #FDFAF6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; font-size: 15px; line-height: 1.75; }
    .hero { background: linear-gradient(160deg, #2C1F14 0%, #5C3D2A 50%, #7A5540 100%); color: #FAF7F2; text-align: center; padding: 72px 24px 64px; position: relative; overflow: hidden; }
    .hero-label { font-size: 12px; letter-spacing: 4px; color: var(--olive-light); text-transform: uppercase; margin-bottom: 20px; font-family: 'Noto Sans KR', sans-serif; font-weight: 300; }
    .hero-title { font-family: 'Noto Serif KR', serif; font-size: clamp(32px, 7vw, 52px); font-weight: 300; letter-spacing: -0.5px; line-height: 1.3; margin-bottom: 12px; }
    .hero-title strong { font-weight: 600; color: #D4A882; }
    .container { max-width: 600px; margin: 0 auto; padding: 0 20px; }
    .section { padding: 48px 0; }
    .intro-card { background: var(--section-bg); border-radius: 16px; padding: 32px 28px; margin: 40px 0; }
    .form-group { margin-bottom: 24px; }
    label { display: block; font-size: 13.5px; font-weight: 500; margin-bottom: 8px; }
    .required { color: var(--terra); margin-left: 2px; }
    .optional { font-size: 11px; color: var(--text-light); margin-left: 4px; font-weight: 300; }
    input[type="text"], input[type="tel"], input[type="email"], textarea { width: 100%; background: var(--input-bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 13px 16px; font-size: 14px; font-family: inherit; transition: all 0.2s ease; }
    input:focus, textarea:focus { outline: none; border-color: var(--terra); background: #FFF; box-shadow: 0 0 0 4px rgba(176,125,98,0.08); }
    .radio-group, .checkbox-group { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .radio-item, .check-item { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px 12px; border-radius: 8px; border: 1px solid transparent; transition: all 0.2s; }
    .radio-item:hover, .check-item:hover { background: rgba(176,125,98,0.04); border-color: rgba(176,125,98,0.1); }
    input[type="radio"], input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--terra); cursor: pointer; }
    .submit-btn { width: 100%; background: var(--terra); color: white; border: none; border-radius: 12px; padding: 17px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; margin-top: 12px; }
    .submit-btn:hover { background: var(--terra-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(176,125,98,0.2); }
    .submit-btn:disabled { background: var(--text-light); cursor: not-allowed; transform: none; }
    #hidden_iframe { display: none; }
    footer { padding: 48px 24px; text-align: center; border-top: 1px solid var(--border); background: #F5F2EC; color: var(--text-light); font-size: 12px; }
  </style>
</head>
<body>

<div class="hero">
  <p class="hero-label">심리상담연구소 심지 · 제 10기</p>
  <h1 class="hero-title">다시 태어나는 나,<br><strong>나비</strong></h1>
</div>

<div class="container">
  <div class="section">
    <div class="intro-card">
      <p>십우도와 타로를 활용한 아들러 성장프로그램 '나비' 신청서입니다.</p>
    </div>

    <form
      id="applyForm"
      action="https://script.google.com/macros/s/AKfycby9kpVpJzOYYikKKuxHxzV-J_2iU5tgXG-NjFLX223nW3WPO7xmKTrzDfvdEaWRD4WS/exec"
      method="POST"
      target="hidden_iframe"
    >
      <input type="hidden" name="program_name" value="나비프로그램">

      <div class="form-group">
        <label>참가자 성명 <span class="required">*</span></label>
        <input type="text" name="성함" placeholder="이름을 입력해주세요" required />
      </div>

      <div class="form-group">
        <label>연락처 <span class="required">*</span></label>
        <input type="tel" name="연락처" placeholder="010-0000-0000" required />
      </div>

      <div class="form-group">
        <label>타로를 활용한 경험이 있으신가요? <span class="required">*</span></label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="타로경험" value="잘 활용함" required /><span>네, 잘 활용합니다</span></label>
          <label class="radio-item"><input type="radio" name="타로경험" value="약간의 체험" /><span>약간의 체험 경험이 있습니다</span></label>
          <label class="radio-item"><input type="radio" name="타로경험" value="처음" /><span>처음 접합니다</span></label>
        </div>
      </div>

      <div class="form-group">
        <label>참여 동기 및 바라는 점 <span class="optional">(선택)</span></label>
        <textarea name="참여동기" placeholder="자유롭게 적어주세요."></textarea>
      </div>

      <button type="submit" id="submitBtn" class="submit-btn">신청서 제출하기</button>
    </form>

    <p style="text-align:center; font-size:12px; color:var(--text-light); margin-top:20px;">
      문의: <a href="mailto:simjimind@gmail.com" style="color:var(--terra); text-decoration:none;">simjimind@gmail.com</a>
    </p>
  </div>
</div>

<footer>
  <p>심리상담연구소 心地</p>
</footer>

<iframe name="hidden_iframe" id="hidden_iframe" onload="if(submitted){alert('신청이 완료되었습니다! 확인 후 연락드리겠습니다.'); location.reload();}"></iframe>

<script>
  var submitted = false;
  document.getElementById('applyForm').onsubmit = function() {
    submitted = true;
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').innerText = '전송 중...';
  };
</script>

</body>
</html>
